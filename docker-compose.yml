services:
  web:
    build: .
    container_name: catalogo_web
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: catalogo_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catalogo_tech
    ports:
      - "3308:3306"
    volumes:
      - mysql_catalogo:/var/lib/mysql
      - ./database/catalogo_tech.sql:/docker-entrypoint-initdb.d/catalogo_tech.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: catalogo_phpmyadmin
    restart: always
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  mysql_catalogo: